[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    --cov=.
    --cov-report=xml:tests/reports/coverage.xml
    --cov-report=html:tests/reports/coverage-html
    --cov-fail-under=80
    --junitxml=tests/reports/junit-results.xml
    -v

# Coverage threshold
[coverage:run]
omit = 
    tests/*
    */site-packages/*

[coverage:report]
fail_under = 80