# ── Project Info ──────────────────────────────────────────────
sonar.projectKey=OT-Microservices
sonar.projectName=OT-Microservices
sonar.projectVersion=1.0.0

# ── Source Code ───────────────────────────────────────────────
sonar.sources=.
sonar.exclusions=\
    tests/**,\
    **/__pycache__/**,\
    **/*.pyc,\
    **/site-packages/**,\
    .git/**

# ── Test Configuration ────────────────────────────────────────
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# ── Python Specific ───────────────────────────────────────────
sonar.language=py
sonar.python.version=3.9

# ── Coverage Report ───────────────────────────────────────────
sonar.python.coverage.reportPaths=tests/reports/unit-coverage.xml

# ── Test Reports ──────────────────────────────────────────────
sonar.python.xunit.reportPath=tests/reports/unit-results.xml

# NOTE: sonar.branch.name removed — Community Edition support nahi karta